services:
  aios:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - aios_outputs:/app/outputs
      - aios_inputs:/app/inputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aios.rule=Host(`aios.expansao-ai.com.br`)"
      - "traefik.http.routers.aios.entrypoints=https"
      - "traefik.http.routers.aios.tls=true"
      - "traefik.http.routers.aios.tls.certresolver=letsencrypt"
      - "traefik.http.services.aios.loadbalancer.server.port=8000"
      - "traefik.http.routers.aios-http.rule=Host(`aios.expansao-ai.com.br`)"
      - "traefik.http.routers.aios-http.entrypoints=http"
      - "traefik.http.routers.aios-http.middlewares=redirect-to-https"

volumes:
  aios_outputs:
  aios_inputs:
